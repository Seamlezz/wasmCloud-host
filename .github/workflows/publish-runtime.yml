name: publish-runtime

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-runtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Dagger check needs publish
        uses: memospot/action-dagger@v1
        with:
          version: "latest"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          args: >-
            check

  needs-publish:
    runs-on: ubuntu-latest
    outputs:
      needs-publish: ${{ steps.gate.outputs.needs-publish }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - id: gate
        uses: memospot/action-dagger@v1
        with:
          version: "latest"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          dagger-flags: "-s"
          args: >-
            needs-publish
            --registry=ghcr.io
            --image=seamlezz/wasmcloud-host
            --username=${{ github.actor }}
            --password=env:GITHUB_TOKEN
            --force=${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: set-output
        run: |
          v="$(echo "${{ steps.gate.outputs.output }}" | tr -d '[:space:]')"
          if [ "$v" = "true" ]; then
            echo "needs-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs-publish=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [check, needs-publish]
    if: needs.needs-publish.outputs.needs-publish == 'true'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Dagger build
        uses: memospot/action-dagger@v1
        with:
          version: "latest"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          args: >-
            build
            --platform=${{ matrix.platform }}

  publish:
    needs: [needs-publish, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Dagger publish if needed
        uses: memospot/action-dagger@v1
        with:
          version: "latest"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          args: >-
            publish
            --registry=ghcr.io
            --image=seamlezz/wasmcloud-host
            --include-latest=true
            --username=${{ github.actor }}
            --password=env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
