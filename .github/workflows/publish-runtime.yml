name: publish-runtime

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-runtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Dagger check
        uses: memospot/action-dagger@v1
        with:
          version: "latest"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          args: >-
            check

  needs-publish:
    runs-on: ubuntu-latest
    outputs:
      needs-publish: ${{ steps.set-output.outputs.needs-publish }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - id: gate
        uses: memospot/action-dagger@v1
        with:
          version: "latest"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          dagger-flags: "-s"
          args: >-
            needs-publish
            --registry=ghcr.io
            --image=seamlezz/wasmcloud-host
            --username=${{ github.actor }}
            --password=env:GITHUB_TOKEN
            --force=${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: set-output
        run: |
          v="$(echo "${{ steps.gate.outputs.output }}" | tr -d '[:space:]')"
          if [ "$v" = "true" ]; then
            echo "needs-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs-publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish-platform:
    needs: [check, needs-publish]
    if: needs.needs-publish.outputs.needs-publish == 'true'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Dagger publish platform
        uses: memospot/action-dagger@v1
        with:
          version: "latest"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          cache-key: wasmcloud-host-${{ matrix.platform }}-${{ github.run_id }}
          args: >-
            publish-platform
            --platform=${{ matrix.platform }}
            --registry=ghcr.io
            --image=seamlezz/wasmcloud-host
            --username=${{ github.actor }}
            --password=env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  manifest:
    needs: [publish-platform]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: version
        uses: memospot/action-dagger@v1
        with:
          version: "latest"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          dagger-flags: "-s"
          args: runtime-version

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          IMAGE: ghcr.io/seamlezz/wasmcloud-host
          VERSION: ${{ steps.version.outputs.output }}
        run: |
          set -euo pipefail
          VERSION="$(echo "$VERSION" | tr -d '[:space:]')"
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
