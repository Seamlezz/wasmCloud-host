name: publish-runtime

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Dagger publish if needed
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.21.3"
          verb: call
          args: >-
            publish-if-needed
            --registry=ghcr.io
            --image=seamlezz/wasmcloud-host
            --include-latest=true
            --username=${{ github.actor }}
            --password=env:GITHUB_TOKEN
            --force=${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
